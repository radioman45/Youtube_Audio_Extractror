<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Audio Extractor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <p class="headline">YouTube Audio Extractor</p>
        <p class="subline">링크만 넣으면 전체 추출, 시간 구간을 넣으면 해당 구간만 잘라서 저장합니다.</p>

        <form id="extract-form" class="form-layout">
          <label class="field">
            <span>YouTube 링크</span>
            <input
              id="url"
              name="url"
              type="url"
              placeholder="https://www.youtube.com/watch?v=..."
              autocomplete="off"
              required
            />
          </label>

          <div class="field-grid">
            <label class="field">
              <span>시작 시간</span>
              <input id="startTime" name="startTime" type="text" placeholder="예: 00:30 또는 90" />
            </label>

            <label class="field">
              <span>종료 시간</span>
              <input id="endTime" name="endTime" type="text" placeholder="예: 01:15 또는 180" />
            </label>
          </div>

          <div class="field-grid field-grid-compact">
            <label class="field">
              <span>오디오 형식</span>
              <select id="audioFormat" name="audioFormat">
                <option value="mp3">MP3</option>
                <option value="m4a">M4A</option>
                <option value="wav">WAV</option>
                <option value="opus">OPUS</option>
              </select>
            </label>

            <div class="field">
              <span>저장 폴더</span>
              <div class="folder-row">
                <div id="folder-display" class="folder-display">브라우저 기본 다운로드 폴더</div>
                <button id="folder-button" class="folder-button" type="button">폴더 선택</button>
              </div>
            </div>
          </div>

          <p id="folder-help" class="helper-text">
            폴더를 선택하면 해당 위치에 바로 저장합니다. 선택하지 않으면 브라우저 기본 다운로드 폴더를 사용합니다.
          </p>

          <button id="submit-button" class="submit-button" type="submit">오디오 추출</button>
        </form>

        <p id="status-text" class="status-text" data-state="idle">대기 중입니다.</p>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
