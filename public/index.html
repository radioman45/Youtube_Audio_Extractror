<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Audio Extractor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <main class="shell">
      <section class="hero">
        <p class="eyebrow">YOUTUBE AUDIO EXTRACTOR</p>
        <h1>링크만 넣으면 전체 추출, 시간을 넣으면 원하는 구간만 잘라냅니다.</h1>
        <p class="subtitle">
          유튜브 링크를 붙여 넣고 MP3, M4A, WAV, OPUS 중 원하는 형식으로 저장하세요.
          시작/종료 시간을 비워 두면 전체 오디오를 그대로 추출합니다.
        </p>
      </section>

      <section class="card">
        <form id="extract-form" class="extract-form">
          <label class="field">
            <span>유튜브 링크</span>
            <input
              id="url"
              name="url"
              type="url"
              placeholder="https://www.youtube.com/watch?v=..."
              required
            />
          </label>

          <div class="field-grid">
            <label class="field">
              <span>오디오 형식</span>
              <select id="audioFormat" name="audioFormat">
                <option value="mp3">MP3</option>
                <option value="m4a">M4A</option>
                <option value="wav">WAV</option>
                <option value="opus">OPUS</option>
              </select>
            </label>

            <label class="field">
              <span>시작 시간</span>
              <input id="startTime" name="startTime" type="text" placeholder="예: 01:20" />
            </label>

            <label class="field">
              <span>종료 시간</span>
              <input id="endTime" name="endTime" type="text" placeholder="예: 02:05" />
            </label>
          </div>

          <div class="tips">
            <span>시간 형식: `90`, `01:30`, `00:01:30`</span>
            <span>비워 두면 전체 구간 추출</span>
          </div>

          <button id="submit-button" type="submit">오디오 추출하기</button>
        </form>

        <section class="status-panel">
          <div class="status-header">
            <h2>진행 상태</h2>
            <span id="health-pill" class="pill">환경 확인 중</span>
          </div>
          <p id="status-message" class="status-message">
            서버가 준비되면 첫 실행 시 `yt-dlp` 바이너리를 자동으로 내려받습니다.
          </p>
        </section>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
